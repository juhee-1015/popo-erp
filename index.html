<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>POPO ERP v1.0</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
  :root {
    color-scheme: light;
    --bg: #f6f6f6;
    --card: #ffffff;
    --ink: #17171a;
    --sub: #63666b;
    --line: #e2e2e2;
    --primary: #1f8a72;
    --primary-dark: #146955;
    --primary-light: #e6f4f0;
    --accent: #a06a1c;
    --accent-light: #f5ebdc;
    --danger: #c0392b;
    --danger-light: #fbeae7;
    --blue: #2f6fb0;
    --blue-light: #e8f0fb;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }
  header.topbar {
    background: var(--primary);
    color: #fff;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  header.topbar .brand { display: flex; align-items: baseline; gap: 10px; cursor: pointer; user-select: none; }
  header.topbar .brand:hover { opacity: 0.85; }
  header.topbar h1 { font-size: 20px; margin: 0; letter-spacing: 0.2px; font-weight: 800; color: #fff; }
  header.topbar .tagline { font-size: 12px; color: rgba(255,255,255,0.85); }
  header.topbar .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  header.topbar button {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.4);
    color: #fff;
    padding: 7px 13px;
    border-radius: 8px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
  }
  header.topbar button:hover { background: rgba(255,255,255,0.28); }
  nav.tabs {
    display: flex;
    gap: 4px;
    background: #fff;
    padding: 0 20px;
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
    position: sticky;
    top: 0;
    z-index: 20;
  }
  nav.tabs button {
    border: none;
    background: transparent;
    padding: 13px 16px;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--sub);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
  }
  nav.tabs button:hover { color: var(--ink); }
  nav.tabs button.active { color: var(--ink); border-bottom-color: var(--primary); font-weight: 700; }
  nav.tabs button.group-toggle::after { content: ''; }
  .subnav {
    display: none;
    flex-wrap: wrap;
    gap: 6px;
    background: #fafafa;
    padding: 10px 20px;
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 45px;
    z-index: 19;
  }
  .subnav.open { display: flex; }
  .subnav button {
    border: 1px solid var(--line);
    background: #fff;
    color: var(--sub);
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .subnav button:hover { background: var(--primary-light); }
  .subnav button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  main { max-width: 1180px; margin: 0 auto; padding: 22px 20px 80px; }
  section.tab { display: none; }
  section.tab.active { display: block; animation: fade .15s ease; }
  @keyframes fade { from{opacity:0} to{opacity:1} }

  h2.tab-title { font-size: 18px; margin: 0 0 4px; font-weight: 800; }
  p.tab-desc { color: var(--sub); margin: 0 0 18px; font-size: 13px; }

  /* 고정 열 개수 대신 auto-fit: 사이드바처럼 좁은 컨테이너에서도 숫자가 안 깨짐 */
  .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 18px;
    min-width: 0;
    box-shadow: 0 2px 10px rgba(180,140,100,0.08);
  }
  .card.clickable { cursor: pointer; transition: box-shadow .12s ease, border-color .12s ease; }
  .card.clickable:hover { border-color: var(--primary); box-shadow: 0 4px 14px rgba(0,0,0,0.1); }
  .card.clickable .goto-hint { font-size: 10.5px; color: var(--primary-dark); margin-top: 6px; }
  .kpi .label { font-size: 12px; color: var(--sub); margin-bottom: 6px; }
  .kpi .value { font-size: clamp(15px, 3.4vw, 21px); font-weight: 700; overflow-wrap: anywhere; word-break: keep-all; line-height: 1.25; }
  .kpi .value.small { font-size: clamp(13px, 2.8vw, 16px); }
  .kpi .sub { font-size: 11.5px; color: var(--sub); margin-top: 4px; overflow-wrap: anywhere; }
  .kpi.accent .value { color: var(--accent); }
  .kpi.primary .value { color: var(--primary-dark); }
  .kpi.danger .value { color: var(--danger); }

  .section-block { margin-bottom: 22px; }
  .section-block h3 { font-size: 14.5px; margin: 0 0 10px; display:flex; align-items:center; justify-content: space-between; }
  .section-block h3 .hint { font-size: 11.5px; color: var(--sub); font-weight: 400; }

  label.field { display: block; font-size: 12px; color: var(--sub); margin-bottom: 4px; }
  input[type=text], input[type=number], input[type=date], select, textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 13px;
    background: #fff;
    color: var(--ink);
    font-family: inherit;
  }
  input:focus, select:focus, textarea:focus { outline: 2px solid var(--primary-light); border-color: var(--primary); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
  .row > div { flex: 1; min-width: 110px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table th, table td { padding: 8px 10px; border-bottom: 1px solid var(--line); text-align: left; }
  table th { color: var(--sub); font-weight: 600; font-size: 12px; background: #fafbf9; }
  table td input { padding: 5px 7px; font-size: 12.5px; }
  table tr:hover td { background: #fbfcfa; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--primary); color: #fff; border: none;
    padding: 9px 15px; border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .btn:hover { background: var(--primary-dark); }
  .btn.secondary { background: #fff; color: var(--ink); border: 1px solid var(--line); }
  .btn.secondary:hover { background: var(--primary-light); }
  .btn.danger { background: var(--danger-light); color: var(--danger); }
  .btn.danger:hover { background: #f6d3cc; }
  .btn.sm { padding: 5px 11px; font-size: 12px; }

  .pill { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .pill.green { background: var(--primary-light); color: var(--primary-dark); }
  .pill.orange { background: var(--accent-light); color: var(--accent); }
  .pill.blue { background: var(--blue-light); color: var(--blue); }
  .pill.red { background: var(--danger-light); color: var(--danger); }

  .recipe-card { border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; background: #fff; }
  .recipe-card .recipe-head { display:flex; justify-content:space-between; align-items:center; margin-bottom: 12px; }
  .recipe-card .recipe-head input[type=text] { font-size: 15px; font-weight: 700; border: none; padding: 2px 0; max-width: 260px; }
  .flow {
    display: flex; align-items: stretch; gap: 6px; overflow-x: auto; padding: 6px 2px 12px;
  }
  .flow .fstep {
    min-width: 108px; background: #fafbf9; border: 1px solid var(--line); border-radius: 10px;
    padding: 8px 9px; text-align: center; flex-shrink: 0;
  }
  .flow .fstep .ftitle { font-size: 10.5px; color: var(--sub); margin-bottom: 4px; }
  .flow .fstep .fval { font-size: 13px; font-weight: 700; }
  .flow .fstep.auto { background: var(--primary-light); }
  .flow .fstep.result { background: var(--accent-light); }
  .flow .arrow { display: flex; align-items: center; color: var(--sub); font-size: 15px; flex-shrink: 0; }
  .flow .fstep input { width: 78px; text-align: center; font-size: 13px; padding: 4px; }

  .todo-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
  .todo-item:last-child { border-bottom: none; }
  .todo-item .owner { font-size: 11px; color: var(--sub); background: #f2f4f1; padding: 1px 7px; border-radius: 10px; }

  .gantt-row { display: grid; grid-template-columns: 170px 1fr; align-items: center; gap: 10px; padding: 6px 0; }
  .gantt-row .glabel { font-size: 12.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .gantt-track { position: relative; height: 20px; background: #f2f4f1; border-radius: 6px; }
  .gantt-bar { position: absolute; top: 2px; height: 16px; border-radius: 5px; background: var(--primary); }
  .gantt-bar.done { background: var(--sub); opacity: .55; }
  .gantt-bar .bar-progress { position:absolute; left:0; top:0; bottom:0; background: rgba(255,255,255,0.35); border-radius: 5px 0 0 5px; }

  .empty { text-align: center; color: var(--sub); padding: 30px 10px; font-size: 13px; }
  .chart-wrap { position: relative; height: 260px; }
  .muted { color: var(--sub); font-size: 12px; }
  .footer-note { text-align: center; color: var(--sub); font-size: 11.5px; margin-top: 40px; line-height: 1.7; }
  .roadmap { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-top: 8px; }
  .roadmap span { background:#fff; border:1px solid var(--line); border-radius:20px; padding:3px 10px; font-size:11px; color: var(--sub); }
  .save-indicator { font-size: 11px; color: rgba(255,255,255,0.75); }
  .share-note { width: 100%; font-size: 10.5px; opacity: .75; text-align: right; }
  ::placeholder { color: #b6bdb6; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(20,30,25,0.45); display:flex; align-items:center; justify-content:center; z-index: 100; padding: 20px; }
  .modal-box { background:#fff; border-radius: var(--radius); padding: 18px 20px; max-width: 480px; width:100%; max-height: 70vh; overflow-y:auto; }
  .modal-head { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom: 12px; }
  .modal-head h3 { margin:0; font-size:15px; display:flex; flex-direction:column; gap:3px; }
  .modal-head h3 .hint { font-size:11px; color:var(--sub); font-weight:400; }
  .history-item { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid var(--line); font-size:12.5px; gap:8px; }
  .history-item .hlabel { flex:1; }
  .history-item .htime { color:var(--sub); font-size:11px; }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand" onclick="setTab('dashboard')" title="홈으로 이동">
    <h1>POPO ERP</h1>
    <span class="tagline">주희 &amp; 은비의 펫푸드 창업 운영 시스템</span>
  </div>
  <div class="actions">
    <span class="save-indicator" id="saveIndicator">저장됨</span>
    <span class="save-indicator" id="cloudIndicator">☁ 클라우드 미설정</span>
    <button onclick="openCloudModal()">☁ 클라우드 동기화</button>
    <button onclick="pushSnapshot('수동 저장')">📌 버전 저장</button>
    <button onclick="openHistoryModal()">🕒 히스토리</button>
    <button onclick="exportData()" title="은비님과 공유: 내보내서 카카오톡/이메일로 전달 → 상대방이 가져오기로 불러오면 됩니다">⬇ 내보내기</button>
    <button onclick="document.getElementById('importFile').click()">⬆ 가져오기</button>
    <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(event)" />
  </div>
  <div class="share-note">클라우드 동기화 설정 시 은비님과 데이터 공유 · 미설정 시 JSON 내보내기/가져오기로 주고받기 · 히스토리는 이 브라우저에만 저장됩니다</div>
</header>

<div id="historyModal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-head">
      <h3>🕒 버전 히스토리 <span class="hint">이 브라우저 로컬에만 저장 (은비님과 공유되지 않음)</span></h3>
      <button class="btn secondary sm" onclick="closeHistoryModal()">닫기</button>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<div id="cloudModal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-head">
      <h3>☁ 클라우드 동기화 <span class="hint">Google Apps Script Web App URL을 입력하면 은비님과 데이터를 공유할 수 있어요</span></h3>
      <button class="btn secondary sm" onclick="closeCloudModal()">닫기</button>
    </div>
    <div id="cloudModalBody"></div>
  </div>
</div>

<nav class="tabs" id="tabNav"></nav>
<div class="subnav" id="subNav"></div>

<main id="mainArea"></main>

<script>
/* =========================================================
   POPO ERP v1.0 — 데이터 모델 & 저장
========================================================= */
const STORAGE_KEY = 'popoErpV1';

function uid() { return Math.random().toString(36).slice(2, 10); }
function won(n) {
  n = Math.round(Number(n) || 0);
  return n.toLocaleString('ko-KR') + '원';
}
function pct(n, digits = 1) {
  if (!isFinite(n)) return '-';
  return (Math.round(n * Math.pow(10, digits)) / Math.pow(10, digits)) + '%';
}
function todayStr() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}
function ymStr(d) { return d.toISOString().slice(0, 7); }

function defaultState() {
  const today = new Date();
  const months = [];
  for (let i = 0; i < 12; i++) {
    const d = new Date(today.getFullYear(), today.getMonth() + i, 1);
    months.push({ month: d.toISOString().slice(0, 7), revenue: 0, cogs: 0, fixedCost: 1500000 });
  }
  return {
    goal: { monthlyTarget: 5000000, avgOrderValue: 18000, workDays: 30 },
    overhead: { monthlyOutputUnits: 500 },
    recipes: [
      {
        id: uid(), name: '닭연어 트릿', overheadEnabled: true,
        ingredients: [
          { id: uid(), name: '닭가슴살', weight: 1500, cost: 18000 },
          { id: uid(), name: '연어', weight: 500, cost: 9000 }
        ],
        driedWeight: 620, packageSize: 50, packagingCost: 250, stickerCost: 100, shippingCost: 500,
        feeRate: 6.5, targetMarginRate: 35, sellingPrice: 9000
      }
    ],
    budget: {
      entries: [
        { id: uid(), date: todayStr(), type: 'income', category: '투자금', item: '초기 투자금 (주희+은비)', amount: 10000000 }
      ]
    },
    pnl: { months },
    schedule: {
      tasks: timelineSeedTasks()
    },
    license: { items: defaultLicenseItems() },
    recipebook: { entries: [] },
    palatability: { tests: [] },
    fixedCostItems: defaultFixedCostItems(),
    inventory: { items: [] },
    vendors: { list: [] },
    meetings: { notes: [] },
    ideas: { list: [] },
    tax: { simplifiedVat: false, vatRate: 20, purchaseAmount: 0 }
  };
}

function migrateState(s) {
  s.recipes = (s.recipes || []).map(migrateRecipe);
  if (!s.overhead) s.overhead = { monthlyOutputUnits: 500 };
  if (!s.license) s.license = { items: defaultLicenseItems() };
  if (!s.recipebook) s.recipebook = { entries: [] };
  if (!s.palatability) s.palatability = { tests: [] };
  if (!s.fixedCostItems) s.fixedCostItems = defaultFixedCostItems();
  if (!s.inventory) s.inventory = { items: [] };
  if (!s.vendors) s.vendors = { list: [] };
  if (!s.meetings) s.meetings = { notes: [] };
  if (!s.ideas) s.ideas = { list: [] };
  if (!s.tax) s.tax = { simplifiedVat: false, vatRate: 20, purchaseAmount: 0 };
  if (!s.pnl) s.pnl = { months: [] };
  ensurePnlYears(s);
  return s;
}

function ensurePnlYears(s) {
  // 손익을 연도 단위로 완전히(1~12월) 채워서, 연도별/월별로 정확히 구분되게 함
  const map = {};
  (s.pnl.months || []).forEach(m => { map[m.month] = m; });
  const years = new Set();
  Object.keys(map).forEach(k => years.add(k.slice(0, 4)));
  years.add(String(new Date().getFullYear()));
  const defaultFixed = (s.fixedCostItems || []).reduce((a, i) => a + (Number(i.amount) || 0), 0);
  years.forEach(y => {
    for (let i = 0; i < 12; i++) {
      const key = y + '-' + String(i + 1).padStart(2, '0');
      if (!map[key]) map[key] = { month: key, revenue: 0, cogs: 0, fixedCost: defaultFixed };
    }
  });
  s.pnl.months = Object.values(map).sort((a, b) => a.month.localeCompare(b.month));
}
function addNextPnlYear() {
  const years = Array.from(new Set(state.pnl.months.map(m => m.month.slice(0,4)))).sort();
  const nextYear = String(Number(years[years.length - 1] || new Date().getFullYear()) + 1);
  const defaultFixed = (state.fixedCostItems || []).reduce((a, i) => a + (Number(i.amount) || 0), 0);
  for (let i = 0; i < 12; i++) {
    const key = nextYear + '-' + String(i + 1).padStart(2, '0');
    if (!state.pnl.months.some(m => m.month === key)) {
      state.pnl.months.push({ month: key, revenue: 0, cogs: 0, fixedCost: defaultFixed });
    }
  }
  state.pnl.months.sort((a,b) => a.month.localeCompare(b.month));
  pnlSelectedYear = nextYear;
  saveState();
  renderPnl();
}

function defaultFixedCostItems() {
  return [
    { id: uid(), name: '임대료(공유주방)', amount: 400000 },
    { id: uid(), name: '인건비(주희+은비)', amount: 800000 },
    { id: uid(), name: '수도전기', amount: 150000 },
    { id: uid(), name: '통신비/기타', amount: 150000 }
  ];
}

function timelineSeedTasks() {
  // 8/2 펫푸드 학원 수료 이후 타임라인 (네이버 스마트스토어 주력 + 공유주방 활용 기준)
  return [
    { id: uid(), name: '펫푸드 학원 수료', owner: '주희', start: '2026-08-02', end: '2026-08-02', done: false, progress: 0, phase: '준비' },
    { id: uid(), name: '사료제조업 등록 가능한 공유주방/공유공장 리스트업 및 실사', owner: '', start: '2026-08-03', end: '2026-08-16', done: false, progress: 0, phase: '준비' },
    { id: uid(), name: 'OEM(위탁생산) 대안 조사 — 플랜B', owner: '', start: '2026-08-03', end: '2026-08-16', done: false, progress: 0, phase: '준비' },
    { id: uid(), name: '동업계약서 작성 (주희·은비 지분/역할)', owner: '', start: '2026-08-03', end: '2026-08-10', done: false, progress: 0, phase: '준비' },
    { id: uid(), name: '상호·브랜드명 확정 및 상표 선점 조사', owner: '', start: '2026-08-10', end: '2026-08-20', done: false, progress: 0, phase: '준비' },
    { id: uid(), name: '공유주방/제조시설 계약', owner: '', start: '2026-08-17', end: '2026-08-31', done: false, progress: 0, phase: '시설' },
    { id: uid(), name: '사업자등록 (통신판매업 겸용)', owner: '', start: '2026-08-24', end: '2026-08-31', done: false, progress: 0, phase: '인허가' },

function migrateRecipe(r) {
  // 구버전(원재료 1개짜리) 데이터를 ingredients 배열로 변환
  if (!Array.isArray(r.ingredients)) {
    r.ingredients = [{
      id: uid(),
      name: r.rawMaterialName || '원재료',
      weight: Number(r.rawWeight) || 0,
      cost: Number(r.rawCost) || 0
    }];
    delete r.rawMaterialName; delete r.rawWeight; delete r.rawCost;
  }
  if (typeof r.overheadEnabled !== 'boolean') r.overheadEnabled = true;
  return r;
}

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return migrateState(defaultState());
    const parsed = JSON.parse(raw);
    // shallow-merge to survive schema growth
    const base = defaultState();
    const merged = migrateState(Object.assign(base, parsed));
    // 기존 사용자에게 8/2 학원 수료 이후 타임라인을 1회만 추가 (기존 일정은 유지)
    if (!merged._timelineSeededV1) {
      merged.schedule = merged.schedule || { tasks: [] };
      merged.schedule.tasks = (merged.schedule.tasks || []).concat(timelineSeedTasks());
      merged._timelineSeededV1 = true;
    }
    return merged;
  } catch (e) {
    console.warn('상태 로드 실패, 기본값 사용', e);
    return migrateState(defaultState());
  }
}

let saveTimer = null;
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  maybeAutoSnapshot();
  scheduleCloudPush();
  const ind = document.getElementById('saveIndicator');
  if (ind) {
    ind.textContent = '저장 중…';
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => { ind.textContent = '저장됨 · ' + new Date().toLocaleTimeString('ko-KR'); }, 250);

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'popo-erp-backup-' + todayStr() + '.json';

function importData(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      pushSnapshot('가져오기 전 백업');
      state = migrateState(Object.assign(defaultState(), parsed));
      saveState();
      renderAll();
      alert('데이터를 가져왔습니다.');
    } catch (e) {
      alert('파일을 읽을 수 없습니다. JSON 백업 파일인지 확인해주세요.');
    }
  };
  reader.readAsText(file);
  evt.target.value = '';
}

const HISTORY_KEY = 'popoErpHistoryV1';

  catch (e) { return []; }

  localStorage.setItem(HISTORY_KEY, JSON.stringify(list.slice(-MAX_HISTORY)));
}
function pushSnapshot(label) {
  const list = getHistory();
  list.push({ ts: Date.now(), label: label || '자동 저장', data: JSON.parse(JSON.stringify(state)) });
  setHistory(list);
  lastAutoSnapshot = Date.now();
  const modal = document.getElementById('historyModal');
  if (modal && modal.style.display !== 'none') renderHistoryList();
}
let lastAutoSnapshot = 0;
function maybeAutoSnapshot() {
  const now = Date.now();
  if (now - lastAutoSnapshot > 1000 * 60 * 60 * 6) { // 6시간마다 자동 스냅샷
    pushSnapshot('자동 저장');
  }
}
function openHistoryModal() {
  document.getElementById('historyModal').style.display = 'flex';
  renderHistoryList();
}
function closeHistoryModal() {
  document.getElementById('historyModal').style.display = 'none';
}
function renderHistoryList() {
  const wrap = document.getElementById('historyList');

    <div class="history-item">
      <div class="hlabel">${escapeHtml(h.label)}<br/><span class="htime">${new Date(h.ts).toLocaleString('ko-KR')}</span></div>
      <button class="btn secondary sm" onclick="restoreSnapshot(${h.ts})">복원</button>

  `).join('') : '<div class="empty">저장된 버전이 없습니다.</div>';
}
function restoreSnapshot(ts) {
  const h = getHistory().find(x => x.ts === ts);
  if (!h) return;
  if (!confirm(new Date(ts).toLocaleString('ko-KR') + ' 버전으로 되돌릴까요? 현재 내용은 덮어씌워집니다.')) return;
  pushSnapshot('복원 전 백업');
  state = migrateState(Object.assign(defaultState(), h.data));
  saveState();
  renderAll();
  closeHistoryModal();

  setHistory(getHistory().filter(x => x.ts !== ts));
  renderHistoryList();
}

async function pullFromCloud(force) {
  const cfg = getCloudConfig();
  if (!cfg.url) return false;
  try {
    const res = await fetch(cfg.url + '?t=' + Date.now());
    if (!res.ok) throw new Error('bad status');
    const json = await res.json();
    if (json && json.data) {
      pushSnapshot('클라우드 가져오기 전 백업');
      state = migrateState(Object.assign(defaultState(), json.data));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      renderAll();
      setCloudStatus('동기화됨 · ' + new Date().toLocaleTimeString('ko-KR'));
    }
    return true;
  } catch (e) {
    console.warn('클라우드 가져오기 실패', e);
    setCloudStatus('연결 오류');
    return false;
  }
}
async function pushToCloud() {
  const cfg = getCloudConfig();
  if (!cfg.url) return false;
  try {
    const res = await fetch(cfg.url, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'save', data: state })
    });
    if (!res.ok) throw new Error('bad status');
    setCloudStatus('동기화됨 · ' + new Date().toLocaleTimeString('ko-KR'));
    return true;
  } catch (e) {
    console.warn('클라우드 올리기 실패', e);
    setCloudStatus('연결 오류');
    return false;
  }
}

/* =========================================================
   계산 로직
========================================================= */
function overheadPerUnit() {
  const fixedCost = Number(currentMonthPnl().fixedCost) || 0;
  const units = Number(state.overhead.monthlyOutputUnits) || 0;
  return units > 0 ? fixedCost / units : 0;
}

function recipeCalc(r) {
  const ingredients = r.ingredients || [];
  const totalRawWeight = ingredients.reduce((a, i) => a + (Number(i.weight) || 0), 0);
  const totalRawCost = ingredients.reduce((a, i) => a + (Number(i.cost) || 0), 0);
  const yieldRate = totalRawWeight > 0 ? (r.driedWeight / totalRawWeight) * 100 : 0;
  const numPackages = r.packageSize > 0 ? Math.max(r.driedWeight / r.packageSize, 0) : 0;
  const ingredientCostPerUnit = numPackages > 0 ? totalRawCost / numPackages : 0;
  const overheadUnit = r.overheadEnabled ? overheadPerUnit() : 0;
  const variableCostExFee = ingredientCostPerUnit + Number(r.packagingCost || 0) + Number(r.stickerCost || 0) + Number(r.shippingCost || 0) + overheadUnit;
  const feeAmount = (Number(r.sellingPrice || 0) * Number(r.feeRate || 0)) / 100;
  const totalCostPerUnit = variableCostExFee + feeAmount;
  const profitPerUnit = Number(r.sellingPrice || 0) - totalCostPerUnit;
  const costRatio = r.sellingPrice > 0 ? (totalCostPerUnit / r.sellingPrice) * 100 : 0;
  const denom = 1 - (Number(r.feeRate || 0) / 100) - (Number(r.targetMarginRate || 0) / 100);
  const recommendedPrice = denom > 0 ? variableCostExFee / denom : NaN;
  return { totalRawWeight, totalRawCost, yieldRate, numPackages, ingredientCostPerUnit, overheadUnit, variableCostExFee, feeAmount, totalCostPerUnit, profitPerUnit, costRatio, recommendedPrice };
}

function budgetTotals() {
  let income = 0, expense = 0, investment = 0;
  const byCategory = {};
  state.budget.entries.forEach(e => {
    const amt = Number(e.amount) || 0;
    if (e.type === 'income') {
      income += amt;
      if (e.category === '투자금') investment += amt;
    } else {
      expense += amt;
      byCategory[e.category] = (byCategory[e.category] || 0) + amt;
    }
  });
  return { income, expense, balance: income - expense, investment, byCategory };
}

function currentMonthPnl() {
  const cur = new Date().toISOString().slice(0, 7);
  return state.pnl.months.find(m => m.month === cur) || state.pnl.months[0];
}

function avgVariableCostRate() {
  const ratios = state.recipes.filter(r => r.sellingPrice > 0).map(r => recipeCalc(r).costRatio / 100);
  if (ratios.length === 0) return 0.6;
  return ratios.reduce((a, b) => a + b, 0) / ratios.length;
}

function bepCalc(fixedCost) {
  const varRate = avgVariableCostRate();
  const cmRate = 1 - varRate;
  if (cmRate <= 0) return { revenue: Infinity, units: Infinity, cmRate };
  const revenue = fixedCost / cmRate;
  const aov = state.goal.avgOrderValue || 1;
  const units = revenue / aov;
  return { revenue, units, cmRate };
}

function weekRange() {
  const now = new Date();
  const day = now.getDay(); // 0 Sun .. 6 Sat
  const diffToMon = (day === 0 ? -6 : 1 - day);
  const mon = new Date(now); mon.setDate(now.getDate() + diffToMon); mon.setHours(0,0,0,0);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23,59,59,999);
  return { start: mon, end: sun };
}

function renderDashboard() {
  const g = state.goal;
  const dailyTarget = g.workDays > 0 ? g.monthlyTarget / g.workDays : 0;
  const neededOrdersPerDay = g.avgOrderValue > 0 ? Math.ceil(dailyTarget / g.avgOrderValue) : 0;
  const neededUnitsPerMonth = g.avgOrderValue > 0 ? Math.ceil(g.monthlyTarget / g.avgOrderValue) : 0;

  const cur = currentMonthPnl();
  const achievement = g.monthlyTarget > 0 ? (cur.revenue / g.monthlyTarget) * 100 : 0;
  const profit = cur.revenue - cur.cogs - cur.fixedCost;

  const bep = bepCalc(cur.fixedCost || 0);

  const wk = weekRange();

function updateGoal() {
  state.goal.monthlyTarget = Number(document.getElementById('g_monthlyTarget').value) || 0;
  state.goal.avgOrderValue = Number(document.getElementById('g_avgOrderValue').value) || 0;
  state.goal.workDays = Number(document.getElementById('g_workDays').value) || 30;
  saveState();
  renderDashboard();
  renderDashboardCharts();
}

function toggleTaskDone(id) {
  const t = state.schedule.tasks.find(x => x.id === id);
  if (t) { t.done = !t.done; if (t.done) t.progress = 100; }
  saveState();
  renderDashboard();
  renderSchedule();
}

function renderDashboardCharts() {
  const canvas = document.getElementById('revenueChartCanvas');
  if (!canvas || typeof Chart === 'undefined') return;
  const thisYear = String(new Date().getFullYear());
  const months = state.pnl.months.filter(m => m.month.slice(0,4) === thisYear).sort((a,b) => a.month.localeCompare(b.month));
  const labels = months.map(m => m.month);
  const revenue = months.map(m => m.revenue);
  const target = months.map(() => state.goal.monthlyTarget);
  if (revenueChart) revenueChart.destroy();
  revenueChart = new Chart(canvas.getContext('2d'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: '실제 매출', data: revenue, backgroundColor: '#8fcbb0' },
        { label: '목표', data: target, type: 'line', borderColor: '#dd8078', borderDash: [5,4], pointRadius: 0, borderWidth: 2, fill: false }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
  });
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function addRecipe() {
  state.recipes.push({
    id: uid(), name: '새 레시피', overheadEnabled: true,
    ingredients: [{ id: uid(), name: '', weight: 1000, cost: 0 }],
    driedWeight: 300, packageSize: 50, packagingCost: 200, stickerCost: 100, shippingCost: 500,
    feeRate: 6.5, targetMarginRate: 35, sellingPrice: 0
  });
  saveState();
  renderCost();
}
function deleteRecipe(id) {
  if (!confirm('이 레시피를 삭제할까요?')) return;
  state.recipes = state.recipes.filter(r => r.id !== id);
  saveState();
  renderCost();
  renderPrice();
}
function updateRecipe(id, field, value) {
  const r = state.recipes.find(x => x.id === id);
  if (!r) return;
  const numericFields = ['driedWeight','packageSize','packagingCost','stickerCost','shippingCost','feeRate','targetMarginRate','sellingPrice'];
  if (field === 'overheadEnabled') r[field] = Boolean(value);
  else r[field] = numericFields.includes(field) ? Number(value) || 0 : value;
  saveState();
  renderRecipeList();
  if (activeTab === 'price') renderPrice();
  if (activeTab === 'dashboard') renderDashboard();
}
function addIngredient(recipeId) {
  const r = state.recipes.find(x => x.id === recipeId);
  if (!r) return;
  r.ingredients.push({ id: uid(), name: '', weight: 0, cost: 0 });
  saveState();
  renderRecipeList();
}
function removeIngredient(recipeId, ingId) {
  const r = state.recipes.find(x => x.id === recipeId);
  if (!r) return;
  r.ingredients = r.ingredients.filter(i => i.id !== ingId);
  saveState();
  renderRecipeList();
  if (activeTab === 'price') renderPrice();
}
function updateIngredient(recipeId, ingId, field, value) {
  const r = state.recipes.find(x => x.id === recipeId);
  if (!r) return;
  const ing = r.ingredients.find(i => i.id === ingId);
  if (!ing) return;
  ing[field] = (field === 'weight' || field === 'cost') ? (Number(value) || 0) : value;
  saveState();
  renderRecipeList();
  if (activeTab === 'price') renderPrice();
  if (activeTab === 'dashboard') renderDashboard();
}

/* =========================================================
   09. 손익 (연도별 12개월)
========================================================= */
let pnlSelectedYear = String(new Date().getFullYear());

function renderPnl() {
  const el = document.getElementById('tab-pnl');
  const years = Array.from(new Set(state.pnl.months.map(m => m.month.slice(0,4)))).sort();
  if (!years.includes(pnlSelectedYear)) pnlSelectedYear = years[years.length - 1] || String(new Date().getFullYear());
  const yearMonths = state.pnl.months.filter(m => m.month.slice(0,4) === pnlSelectedYear).sort((a,b) => a.month.localeCompare(b.month));

  const yearTabsHtml = years.map(y => `<button class="${y===pnlSelectedYear?'active':''}" onclick="selectPnlYear('${y}')">${y}</button>`).join('');

  const rows = yearMonths.map((m) => {
    const idx = state.pnl.months.findIndex(x => x.month === m.month);
    const profit = m.revenue - m.cogs - m.fixedCost;
    const margin = m.revenue > 0 ? (profit / m.revenue) * 100 : 0;
    return `
      <tr>
        <td>${m.month}</td>
        <td><input type="number" value="${m.revenue}" style="width:100px" oninput="updatePnl(${idx},'revenue',this.value)" /></td>
        <td><input type="number" value="${m.cogs}" style="width:100px" oninput="updatePnl(${idx},'cogs',this.value)" /></td>
        <td><input type="number" value="${m.fixedCost}" style="width:100px" oninput="updatePnl(${idx},'fixedCost',this.value)" /></td>
        <td style="color:${profit<0?'var(--danger)':'inherit'};font-weight:600">${won(profit)}</td>
        <td>${pct(margin)}</td>
      </tr>
    `;
  }).join('');
  const totalRevenue = yearMonths.reduce((a,m) => a + Number(m.revenue||0), 0);
  const totalProfit = yearMonths.reduce((a,m) => a + (Number(m.revenue||0) - Number(m.cogs||0) - Number(m.fixedCost||0)), 0);
  const fcItems = state.fixedCostItems || [];
  const fcTotal = fcItems.reduce((a,i) => a + (Number(i.amount)||0), 0);
  const fcRows = fcItems.map((i, idx) => `
    <tr>
      <td><input type="text" value="${escapeHtml(i.name)}" oninput="updateFixedCostItem(${idx},'name',this.value)" /></td>
      <td><input type="number" value="${i.amount}" style="width:110px" oninput="updateFixedCostItem(${idx},'amount',this.value)" /></td>
      <td><button class="btn danger sm" onclick="deleteFixedCostItem(${idx})">삭제</button></td>
    </tr>
  `).join('');
  el.innerHTML = `
    <h2 class="tab-title">손익</h2>
    <p class="tab-desc">연도별로 12개월이 항상 채워져 있어서, 연도를 선택해 월별 손익을 정확히 확인할 수 있습니다. 스마트스토어 등 판매 수수료는 매출에 비례하는 변동비라 원가계산기의 "판매 수수료(%)"에서 반영되고, 여기 고정비는 매출과 상관없이 매달 나가는 비용(임대료·인건비 등)입니다.</p>

    <div class="card section-block">
      <h3 style="margin-top:0">고정비 상세 항목 <span class="hint">합계 ${won(fcTotal)}</span></h3>
      <table>
        <thead><tr><th>항목</th><th>월 금액(원)</th><th></th></tr></thead>
        <tbody>${fcRows || '<tr><td colspan="3" class="empty">항목이 없습니다.</td></tr>'}</tbody>
      </table>
      <div class="row" style="margin-top:10px">
        <button class="btn secondary sm" onclick="addFixedCostItem()">+ 항목 추가</button>
        <button class="btn sm" onclick="applyFixedCostToCurrentMonth()">이번달에 합계 적용</button>
        <button class="btn sm" onclick="applyFixedCostToYear()">${pnlSelectedYear}년 전체에 합계 적용</button>
      </div>
      <div class="muted" style="margin-top:8px">여기서 항목을 정리해두고, "적용" 버튼을 누르면 아래 표의 고정비 칸에 합계가 채워집니다. 달마다 다르면 아래 표에서 개별적으로 다시 조정하시면 돼요.</div>
    </div>

    <div class="section-block" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <div class="row" style="gap:4px;flex:none">${yearTabsHtml}</div>
      <button class="btn secondary sm" onclick="addNextPnlYear()">+ 다음 연도 추가</button>
    </div>

    <div class="grid cols-2 section-block">
      <div class="card kpi primary"><div class="label">${pnlSelectedYear}년 누적 매출</div><div class="value">${won(totalRevenue)}</div></div>
      <div class="card kpi"><div class="label">${pnlSelectedYear}년 누적 순이익</div><div class="value" style="color:${totalProfit<0?'var(--danger)':'var(--primary-dark)'}">${won(totalProfit)}</div></div>
    </div>
    <div class="card section-block">
      <div class="chart-wrap"><canvas id="pnlChartCanvas"></canvas></div>
    </div>
    <div class="card">
      <table>
        <thead><tr><th>월</th><th>매출</th><th>매출원가</th><th>고정비</th><th>순이익</th><th>마진율</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
  renderPnlChart();
}
function selectPnlYear(y) {
  pnlSelectedYear = y;
  renderPnl();
}
function addFixedCostItem() {
  state.fixedCostItems.push({ id: uid(), name: '새 항목', amount: 0 });
  saveState();
  renderPnl();
}
function deleteFixedCostItem(idx) {
  state.fixedCostItems.splice(idx, 1);
  saveState();
  renderPnl();
}
function updateFixedCostItem(idx, field, value) {
  state.fixedCostItems[idx][field] = field === 'amount' ? (Number(value) || 0) : value;

}
function fixedCostTotal() {
  return (state.fixedCostItems || []).reduce((a,i) => a + (Number(i.amount)||0), 0);
}
function applyFixedCostToCurrentMonth() {
  const cur = new Date().toISOString().slice(0, 7);
  const m = state.pnl.months.find(m => m.month === cur);

function applyFixedCostToYear() {
  const total = fixedCostTotal();
  state.pnl.months.filter(m => m.month.slice(0,4) === pnlSelectedYear).forEach(m => { m.fixedCost = total; });
  saveState();
  renderPnl();
  if (activeTab === 'dashboard') renderDashboard();
  if (activeTab === 'cost') renderCost();
}
function updatePnl(idx, field, value) {
  state.pnl.months[idx][field] = Number(value) || 0;
  saveState();
  renderPnl();
  if (activeTab === 'dashboard') renderDashboard();
}
function renderPnlChart() {
  const canvas = document.getElementById('pnlChartCanvas');
  if (!canvas || typeof Chart === 'undefined') return;
  const yearMonths = state.pnl.months.filter(m => m.month.slice(0,4) === pnlSelectedYear).sort((a,b) => a.month.localeCompare(b.month));
  const labels = yearMonths.map(m => m.month);
  const revenue = yearMonths.map(m => m.revenue);
  const profit = yearMonths.map(m => m.revenue - m.cogs - m.fixedCost);
  if (pnlChart) pnlChart.destroy();
  pnlChart = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '매출', data: revenue, borderColor: '#a8bfe8', backgroundColor: 'rgba(168,191,232,0.18)', fill: true, tension: .3 },
        { label: '순이익', data: profit, borderColor: '#5fa98a', backgroundColor: 'rgba(143,203,176,0.2)', fill: true, tension: .3 }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false }
  });
}

/* =========================================================
   02. 창업일정 (간트차트)
========================================================= */
function renderSchedule() {
  const el = document.getElementById('tab-schedule');
  const tasks = state.schedule.tasks;
  let minDate = null, maxDate = null;
  tasks.forEach(t => {
    const s = new Date(t.start), e = new Date(t.end || t.start);
    if (!minDate || s < minDate) minDate = s;
    if (!maxDate || e > maxDate) maxDate = e;
  });
  const totalSpan = (minDate && maxDate) ? Math.max(maxDate - minDate, 86400000) : 86400000;

  const rows = tasks.map((t, idx) => {
    const s = new Date(t.start), e = new Date(t.end || t.start);
    const leftPct = minDate ? ((s - minDate) / totalSpan) * 100 : 0;
    const widthPct = minDate ? Math.max(((e - s) / totalSpan) * 100, 2) : 2;
    const prog = t.done ? 100 : Number(t.progress || 0);
    return `
      <div class="gantt-row">
        <div class="glabel" title="${escapeHtml(t.name)}">
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="updateTask(${idx},'done',this.checked)" />
          ${escapeHtml(t.name)} <span class="pill blue" style="margin-left:4px">${escapeHtml(t.owner||'-')}</span>
        </div>
        <div class="gantt-track">
          <div class="gantt-bar ${t.done ? 'done' : ''}" style="left:${leftPct}%;width:${widthPct}%">
            <div class="bar-progress" style="width:${prog}%"></div>
          </div>
        </div>
      </div>
    `;
  }).join('');

  const editRows = tasks.map((t, idx) => `
    <tr>
      <td><input type="text" value="${escapeHtml(t.name)}" oninput="updateTask(${idx},'name',this.value)" /></td>
      <td><input type="text" value="${escapeHtml(t.owner)}" style="width:70px" oninput="updateTask(${idx},'owner',this.value)" /></td>
      <td><input type="date" value="${t.start}" oninput="updateTask(${idx},'start',this.value)" /></td>
      <td><input type="date" value="${t.end}" oninput="updateTask(${idx},'end',this.value)" /></td>
      <td><input type="number" min="0" max="100" value="${t.progress||0}" style="width:65px" oninput="updateTask(${idx},'progress',this.value)" /></td>
      <td><input type="checkbox" ${t.done?'checked':''} onchange="updateTask(${idx},'done',this.checked)" /></td>
      <td><button class="btn danger sm" onclick="deleteTask(${idx})">삭제</button></td>
    </tr>
  `).join('');

  const totalTasks = tasks.length;
  const doneTasks = tasks.filter(t => t.done).length;
  const overallProgress = totalTasks ? (tasks.reduce((a,t) => a + (t.done?100:Number(t.progress||0)),0) / totalTasks) : 0;

  el.innerHTML = `
    <h2 class="tab-title">창업 일정</h2>
    <p class="tab-desc">작업을 등록하면 간트차트와 전체 진행률이 자동 계산됩니다.</p>
    <div class="card section-block">
      <h3 style="margin-top:0">전체 진행률 <span class="pill green">${doneTasks}/${totalTasks} 완료 · ${pct(overallProgress)}</span></h3>
      ${rows || '<div class="empty">등록된 작업이 없습니다.</div>'}
    </div>
    <div class="card">
      <h3 style="margin-top:0">작업 목록</h3>
      <table>
        <thead><tr><th>작업명</th><th>담당자</th><th>시작일</th><th>종료일</th><th>진행률(%)</th><th>완료</th><th></th></tr></thead>
        <tbody>${editRows || '<tr><td colspan="7" class="empty">작업이 없습니다.</td></tr>'}</tbody>
      </table>
      <button class="btn" style="margin-top:10px" onclick="addTask()">+ 작업 추가</button>
    </div>
  `;
}
function addTask() {
  state.schedule.tasks.push({ id: uid(), name: '새 작업', owner: '', start: todayStr(), end: todayStr(), done: false, progress: 0 });
  saveState();
  renderSchedule();
}
function deleteTask(idx) {
  state.schedule.tasks.splice(idx, 1);
  saveState();
  renderSchedule();
}
function updateTask(idx, field, value) {
  const t = state.schedule.tasks[idx];
  if (!t) return;
  if (field === 'done') { t.done = value; if (value) t.progress = 100; }
  else if (field === 'progress') { t.progress = Math.min(100, Math.max(0, Number(value) || 0)); if (t.progress >= 100) t.done = true; }
  else t[field] = value;
  saveState();
  renderSchedule();
  if (activeTab === 'dashboard') renderDashboard();
}

function renderPalatability() {

  state.palatability.tests.forEach(t => {

    avgByRecipe[t.recipeName].push(Number(t.rating) || 0);
  });
  const summaryRows = Object.keys(avgByRecipe).map(name => {
    const arr = avgByRecipe[name];
    const avg = arr.reduce((a,b)=>a+b,0) / arr.length;
    return `<tr><td>${escapeHtml(name)}</td><td>${arr.length}회</td><td>${avg.toFixed(1)} / 5</td></tr>`;
  }).join('');
  const rows = tests.map(t => {
    const idx = state.palatability.tests.findIndex(x => x.id === t.id);
    return `

          ${['완식','대부분 섭취','절반 섭취','조금만','거부'].map(o => `<option value="${o}" ${t.eatResult===o?'selected':''}>${o}</option>`).join('')}

function renderInventory() {
  const el = document.getElementById('tab-inventory');
  const items = state.inventory.items;
  const now = new Date();
  const soon = new Date(now); soon.setDate(now.getDate() + 7);
  const lowCount = items.filter(i => Number(i.quantity) <= Number(i.lowStockThreshold || 0)).length;
  const expiringCount = items.filter(i => i.expiryDate && new Date(i.expiryDate) <= soon && new Date(i.expiryDate) >= now).length;
  const expiredCount = items.filter(i => i.expiryDate && new Date(i.expiryDate) < now).length;
  const rows = items.map((i, idx) => {
    const isLow = Number(i.quantity) <= Number(i.lowStockThreshold || 0);
    const isExpired = i.expiryDate && new Date(i.expiryDate) < now;
    const isExpiring = i.expiryDate && !isExpired && new Date(i.expiryDate) <= soon;
    return `
    <tr>
      <td><input type="text" value="${escapeHtml(i.name)}" oninput="updateInventory(${idx},'name',this.value)" /></td>
      <td>
        <select onchange="updateInventory(${idx},'category',this.value)">

          <option value="완제품" ${i.category==='완제품'?'selected':''}>완제품</option>
        </select>
      </td>
      <td><input type="number" value="${i.quantity}" style="width:70px" oninput="updateInventory(${idx},'quantity',this.value)" /></td>
      <td><input type="text" value="${escapeHtml(i.unit)}" style="width:55px" oninput="updateInventory(${idx},'unit',this.value)" placeholder="kg/개" /></td>
      <td><input type="number" value="${i.lowStockThreshold}" style="width:70px" oninput="updateInventory(${idx},'lowStockThreshold',this.value)" /></td>
      <td><input type="date" value="${i.expiryDate}" oninput="updateInventory(${idx},'expiryDate',this.value)" /></td>
      <td>
        ${isExpired ? '<span class="pill red">기한만료</span>' : isExpiring ? '<span class="pill orange">임박</span>' : ''}

    <div class="grid section-block">
      <div class="card kpi ${lowCount ? 'danger' : ''}"><div class="label">재고부족</div><div class="value" style="color:${lowCount?'var(--danger)':'inherit'}">${lowCount}건</div></div>
      <div class="card kpi ${expiringCount ? 'danger' : ''}"><div class="label">유통기한 임박(7일 내)</div><div class="value" style="color:${expiringCount?'var(--danger)':'inherit'}">${expiringCount}건</div></div>
      <div class="card kpi ${expiredCount ? 'danger' : ''}"><div class="label">유통기한 만료</div><div class="value" style="color:${expiredCount?'var(--danger)':'inherit'}">${expiredCount}건</div></div>

/* =========================================================
   세금 (부가세/종소세 간단 계산기 — 참고용, 정확한 금액은 세무사 상담 필요)
========================================================= */
function renderTax() {
  const el = document.getElementById('tab-tax');
  const t = state.tax;
  const thisYear = String(new Date().getFullYear());
  const yearMonths = state.pnl.months.filter(m => m.month.slice(0,4) === thisYear);
  const annualRevenue = yearMonths.reduce((a,m) => a + Number(m.revenue||0), 0);
  const annualProfit = yearMonths.reduce((a,m) => a + (Number(m.revenue||0) - Number(m.cogs||0) - Number(m.fixedCost||0)), 0);
  let vatEstimate;
  if (t.simplifiedVat) {
    vatEstimate = annualRevenue * (Number(t.vatRate)/100) * 0.1;
  } else {
    vatEstimate = Math.max(0, (annualRevenue - Number(t.purchaseAmount||0)) * 0.1);
  }
  el.innerHTML = `
    <h2 class="tab-title">세금 (참고용)</h2>
    <p class="tab-desc">아래는 대략적인 추정치입니다. 실제 부가세·종합소득세는 업종, 간이과세 배제지역 여부, 각종 공제 등에 따라 달라지므로 홈택스 또는 세무사 상담으로 정확한 금액을 확인하세요.</p>

    <div class="card section-block">
      <h3 style="margin-top:0">부가가치세 추정</h3>
      <label style="display:flex;align-items:center;gap:7px;font-size:13px;margin-bottom:10px">
        <input type="checkbox" style="width:auto" ${t.simplifiedVat?'checked':''} onchange="updateTax('simplifiedVat', this.checked)" />
        간이과세자입니다 (연매출 약 1억 400만원 미달 소규모사업자 기준. 배제지역 등록 시 무조건 일반과세자이니 확인 필요)
      </label>
      ${t.simplifiedVat ? `
        <div class="row">
          <div>
            <label class="field">업종별 부가가치율(%) — 홈택스에서 업종 확인</label>
            <input type="number" value="${t.vatRate}" oninput="updateTax('vatRate', this.value)" />
          </div>
        </div>
        <div class="muted" style="margin-top:6px">계산: 연매출 × 부가가치율 × 10%</div>
      ` : `
        <div class="row">
          <div>
            <label class="field">연간 매입액(매입세액 계산용, 원)</label>
            <input type="number" value="${t.purchaseAmount}" oninput="updateTax('purchaseAmount', this.value)" />
          </div>
        </div>
        <div class="muted" style="margin-top:6px">계산: (연매출 − 연매입) × 10%</div>
      `}
      <div class="grid section-block" style="margin-top:14px">
        <div class="card kpi clickable" onclick="setTab('pnl')"><div class="label">${thisYear}년 매출</div><div class="value small">${won(annualRevenue)}</div><div class="goto-hint">손익 탭에서 자세히 보기 →</div></div>
        <div class="card kpi primary"><div class="label">부가세 추정액</div><div class="value">${won(vatEstimate)}</div></div>
      </div>
    </div>

    <div class="card">
      <h3 style="margin-top:0">종합소득세 참고</h3>
      <div class="grid section-block">
        <div class="card kpi clickable" onclick="setTab('pnl')"><div class="label">${thisYear}년 순이익</div><div class="value small">${won(annualProfit)}</div><div class="goto-hint">손익 탭에서 자세히 보기 →</div></div>
      </div>
      <div class="muted">종합소득세는 이 순이익(사업소득)에 다른 소득을 합산하고 각종 공제를 제외한 금액에 6~45% 누진세율을 적용합니다. 공제 항목이 많아 이 앱에서는 정확한 세액을 계산하지 않습니다 — 홈택스 모의계산 또는 세무사 상담을 권장합니다.</div>
    </div>
  `;
}
function updateTax(field, value) {
  state.tax[field] = (field === 'simplifiedVat') ? Boolean(value) : Number(value) || 0;
  saveState();
  renderTax();
}
